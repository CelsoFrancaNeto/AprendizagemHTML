<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Login</title>
	</head>

	<body>

	<h2>Login</h2>
	<form>

		Login:<br>
		<input type="text" name="login"><br>

		Senha:<br>
		<input type="password" name="senha"><br>
		
		<input type="submit" value="Entrar">

	</form>

	<h2>Cadastrar</h2>
	<form>

		Login:<br>
		<input type="text" name="login"><br><br>

		Sexo:<br>
		<input type="radio" name="sexo" value="m">Masculino<br>
		<input type="radio" name="sexo" value="f">Feminino<br><br>

		Interesses:<br>
		<input type="checkbox" name="interesses">Futebol<br>
		<input type="checkbox" name="interesses">Cursos<br>
		<input type="checkbox" name="interesses">Modas<br><br>

		Estado:<br>
		
		<select name="estado">
			<option value="mg">MG</option>
			<option value="sp">SP</option>
			<option value="rj">RJ</option>
			<option value="sc">SC</option>
			<option value="rs">RS</option>
		</select><br><br>

		Observações: <br>
		<textarea name="obeservacoes"></textarea><br>

		<input type="submit" value="Cadastrar">

	</form>
	</body>

</html>
