<!doctype html>

<html>

	<head>
		<title>Hello World!</title>
		<meta charset="utf-8">
	</head>

	<body>
		<h1>Hello World!</h1>
		<!--lista não ordenada = disc, square, circle-->
		<h2>lista não ordenada</h2>
		<ul type="disc">
			<li>item 1</li>
			<li>item 2</li>
			<li>item 3</li>
		</ul>
		<h2>lista ordenada</h2>
		<!--lista ordenada = 1, A, a, I, i -->
		<ol type="1">
			<li>item 1</li>
			<li>item 2</li>
			<li>item 3</li>
		</ol>
	</body>

</html>
